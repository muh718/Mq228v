<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي حساب المثلثات - ثانوية رضوى</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --bg-dark: #0f172a; --accent: #0ea5e9; --glass: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: #f8fafc; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 95vw; }
        @media (min-width: 1024px) { .glass-panel { max-width: 900px; } }
        .math-ltr { direction: ltr; display: inline-flex; align-items: center; font-family: 'Times New Roman', serif; font-weight: bold; }
        .fraction { display: inline-flex; flex-direction: column; text-align: center; line-height: 1.1; padding: 0 5px; }
        .numerator { border-bottom: 2px solid currentColor; }
        .pi-symbol { font-family: 'Georgia', serif; font-style: italic; color: #38bdf8; }
        .option-btn { background-color: #1e293b; border: 1px solid #334155; border-radius: 1.25rem; min-height: 85px; width: 100%; cursor: pointer; transition: 0.2s; font-size: 1.3rem; font-weight: 700; }
        .correct { background-color: #059669 !important; border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .wrong { background-color: #b91c1c !important; border-color: #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .hidden { display: none !important; }
        .loading-spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div id="loader" class="fixed inset-0 bg-slate-950 z-[300] flex items-center justify-center flex-col gap-4">
        <div class="loading-spinner"></div>
        <p class="text-sky-400 font-bold animate-pulse">جاري المزامنة مع قاعدة البيانات الموحدة...</p>
    </div>

    <!-- شاشة البداية -->
    <div id="scr-start" class="hidden glass-panel p-8 sm:p-14 rounded-[2.5rem] text-center shadow-2xl relative">
        <button onclick="toggleAuth(true)" class="absolute top-6 right-6 text-slate-700 hover:text-sky-400 transition-all"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></button>
        <div class="mb-10">
            <h2 class="text-xl font-black text-sky-400 tracking-widest uppercase">ثانوية رضوى</h2>
            <h3 class="text-lg font-bold text-slate-400">أ/ محمد القرني</h3>
            <div class="h-px bg-gradient-to-r from-transparent via-sky-500/50 to-transparent w-full my-8"></div>
            <h1 class="text-5xl sm:text-7xl font-black text-white tracking-tighter">حساب المثلثات</h1>
        </div>
        <div class="space-y-4 max-w-sm mx-auto text-right">
            <input type="text" id="in-name" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-5 text-center text-white outline-none focus:ring-2 focus:ring-sky-500 text-xl" placeholder="الاسم الثلاثي">
            <input type="number" id="in-sect" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-5 text-center text-white text-2xl font-black focus:ring-2 focus:ring-sky-500" placeholder="رقم الشعبة">
            <button onclick="startGame()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-6 rounded-2xl text-2xl mt-8 transition-all active:scale-95 shadow-xl">دخول التحدي</button>
        </div>
    </div>

    <!-- سجل النتائج -->
    <div id="scr-dash" class="hidden fixed inset-0 z-[350] bg-slate-950 flex flex-col p-4 sm:p-10 overflow-hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-white text-right">سجل النتائج السحابي</h1>
            <button onclick="hideDash()" class="bg-red-500/20 text-red-400 px-8 py-3 rounded-2xl border border-red-500/30 font-bold">إغلاق</button>
        </div>
        <div class="flex-1 glass-panel rounded-[2rem] overflow-hidden flex flex-col border border-slate-800">
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead class="bg-slate-900 sticky top-0">
                        <tr>
                            <th class="p-5 text-sky-400 border-b border-slate-800">الاسم</th>
                            <th class="p-5 text-sky-400 border-b border-slate-800 text-center">الشعبة</th>
                            <th class="p-5 text-sky-400 border-b border-slate-800 text-center">الدرجة</th>
                            <th class="p-5 text-sky-400 border-b border-slate-800 text-center">النسبة</th>
                        </tr>
                    </thead>
                    <tbody id="scores-body" class="text-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- شاشة اللعب -->
    <div id="scr-game" class="hidden glass-panel p-6 sm:p-12 rounded-[2.5rem] shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800/50 pb-6">
            <p id="p-info" class="font-bold text-white text-lg text-right"></p>
            <div class="bg-slate-800 px-6 py-2 rounded-xl border border-slate-700">
                <span id="g-score" class="text-3xl font-black text-emerald-400">0</span>
            </div>
        </div>
        <div class="min-h-[180px] flex items-center justify-center text-center mb-10">
            <h2 id="q-text" class="text-2xl sm:text-4xl font-bold leading-relaxed text-slate-100"></h2>
        </div>
        <p class="text-center text-slate-500 text-xs font-bold mb-6">السؤال <span id="q-idx" class="text-sky-400">1</span> من 30</p>
        <div id="opt-box" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

    <!-- شاشة النهاية -->
    <div id="scr-res" class="hidden glass-panel p-10 rounded-[3.5rem] text-center shadow-2xl">
        <div class="text-7xl mb-6">🏆</div>
        <h2 class="text-3xl font-black mb-4 text-white tracking-tight">تم الحفظ بنجاح</h2>
        <p id="r-name" class="text-sky-400 font-bold text-2xl mb-12"></p>
        <div class="flex gap-4 justify-center mb-12">
            <div class="bg-slate-800 p-8 rounded-3xl flex-1 border border-slate-700">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2 text-right">الدرجة</p>
                <p class="text-5xl font-black text-white"><span id="f-score">0</span><span class="text-xl text-slate-600">/30</span></p>
            </div>
            <div class="bg-slate-800 p-8 rounded-3xl flex-1 border border-slate-700 flex flex-col justify-center">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2 text-right">النسبة</p>
                <p id="f-perc" class="text-4xl font-black text-sky-400">0%</p>
            </div>
        </div>
        <button onclick="resetToStart()" class="bg-sky-600 text-white px-16 py-5 rounded-2xl font-black text-xl hover:bg-sky-500 transition-all shadow-xl active:scale-95">تحدي جديد</button>
    </div>

    <!-- استدعاء ملفات البرمجة -->
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
