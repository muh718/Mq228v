<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي حساب المثلثات - ثانوية رضوى</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- ربط ملف التنسيقات الخارجي المحدث -->
    <link rel="stylesheet" href="style.css">

    <style>
        .font-calligraphy { font-family: 'Amiri', serif; }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div id="loader" class="fixed inset-0 bg-emerald-950 z-[300] flex items-center justify-center flex-col gap-4">
        <div class="loading-spinner"></div>
        <p class="text-emerald-400 font-bold animate-pulse text-lg">جاري الاتصال السحابي...</p>
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 z-[600] bg-emerald-950/90 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-emerald-900 border border-emerald-700 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-black text-white mb-2"></h3>
            <p id="modal-desc" class="text-emerald-200 mb-6 font-bold"></p>
            <input type="password" id="modal-input" class="hidden w-full bg-emerald-800 border border-emerald-600 rounded-xl p-4 text-center text-white mb-6 outline-none focus:ring-2 focus:ring-emerald-500 text-2xl tracking-widest" placeholder="••••">
            <div class="flex gap-3">
                <button id="modal-cancel" class="flex-1 bg-emerald-800 text-emerald-300 rounded-xl py-3 font-bold hover:bg-emerald-700 transition-colors">إلغاء</button>
                <button id="modal-confirm" class="flex-1 bg-emerald-600 text-white rounded-xl py-3 font-bold hover:bg-emerald-500 transition-colors shadow-lg">تأكيد</button>
            </div>
        </div>
    </div>

    <div id="scr-start" class="hidden glass-panel p-8 sm:p-14 rounded-[2.5rem] shadow-2xl relative">
        <button onclick="toggleAuth(true)" class="absolute top-6 right-6 text-emerald-800 hover:text-emerald-400 transition-all p-2 rounded-full hover:bg-emerald-900 z-50">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
        
        <div class="mt-4 mb-10">
            <div class="flex justify-between items-end mb-6">
                <div class="text-right">
                    <h2 class="text-3xl sm:text-4xl font-bold text-emerald-400 font-calligraphy">ثانوية رضوى</h2>
                </div>
                <div class="text-left">
                    <h3 class="text-2xl sm:text-3xl font-bold text-emerald-400 font-calligraphy">أ/ محمد القرني</h3>
                </div>
            </div>
            
            <div class="h-px bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent w-full my-6"></div>
            
            <div class="text-center">
                <h1 class="text-4xl sm:text-6xl font-black text-white mb-4">تحدي حساب المثلثات</h1>
                <h3 class="text-lg sm:text-xl font-bold text-emerald-200 bg-emerald-900/40 inline-block px-6 py-2 rounded-full border border-emerald-500/30">الرياضيات - ثاني ثانوي</h3>
            </div>
        </div>

        <div class="space-y-4 max-w-sm mx-auto text-right">
            <input type="text" id="in-name" class="w-full bg-emerald-900/50 border border-emerald-700 rounded-2xl p-5 text-center text-white outline-none focus:ring-2 focus:ring-emerald-500 text-xl" placeholder="الاسم الثلاثي">
            <input type="number" id="in-sect" class="w-full bg-emerald-900/50 border border-emerald-700 rounded-2xl p-5 text-center text-white text-2xl font-black focus:ring-2 focus:ring-emerald-500" placeholder="رقم الشعبة">
            <button onclick="startGame()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-6 rounded-2xl text-2xl mt-8 transition-all active:scale-95 shadow-xl">دخول التحدي</button>
        </div>
    </div>

    <div id="scr-game" class="hidden glass-panel p-6 sm:p-12 rounded-[2.5rem] shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-emerald-800/50 pb-6">
            <p id="p-info" class="font-bold text-white text-lg text-right"></p>
            <div class="bg-emerald-900 px-6 py-2 rounded-xl border border-emerald-700">
                <span id="g-score" class="text-3xl font-black text-emerald-400">0</span>
            </div>
        </div>
        <div class="min-h-[180px] flex items-center justify-center text-center mb-6">
            <h2 id="q-text" class="text-2xl sm:text-4xl font-bold leading-relaxed text-slate-100"></h2>
        </div>
        
        <p class="text-center text-emerald-500 text-xs font-bold mb-8 uppercase tracking-widest font-mono">السؤال <span id="q-idx" class="text-emerald-400">1</span> من 30</p>
        
        <div id="opt-box" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

    <!-- باقي الشاشات محولة للثيم الأخضر -->
    <div id="scr-dash" class="hidden fixed inset-0 z-[350] bg-emerald-950 flex flex-col p-4 sm:p-10 overflow-hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-white">سجل النتائج السحابي</h1>
            <button onclick="hideDash()" class="bg-red-500/20 text-red-400 px-8 py-3 rounded-2xl border border-red-500/30 font-bold hover:bg-red-500/30 transition-all">إغلاق اللوحة</button>
        </div>
        <div class="flex-1 glass-panel rounded-[2rem] overflow-hidden flex flex-col border border-emerald-800 overflow-y-auto">
            <table class="w-full text-right border-collapse">
                <thead class="bg-emerald-900 sticky top-0">
                    <tr><th class="p-5 text-emerald-400 border-b border-emerald-800">الاسم</th><th class="p-5 text-emerald-400 border-b border-emerald-800 text-center">الشعبة</th><th class="p-5 text-emerald-400 border-b border-emerald-800 text-center">الدرجة</th><th class="p-5 text-emerald-400 border-b border-emerald-800 text-center">النسبة</th></tr>
                </thead>
                <tbody id="scores-body" class="text-white"></tbody>
            </table>
        </div>
    </div>

    <div id="scr-res" class="hidden glass-panel p-10 rounded-[3.5rem] text-center shadow-2xl">
        <div class="text-7xl mb-6">🏆</div>
        <h2 class="text-3xl font-black mb-4 text-white">تم حفظ نتيجتك بنجاح</h2>
        <p id="r-name" class="text-emerald-400 font-bold text-2xl mb-12"></p>
        <div class="flex gap-4 justify-center mb-12">
            <div class="bg-emerald-900/50 p-8 rounded-3xl flex-1 border border-emerald-800"><p class="text-emerald-500 text-xs font-bold uppercase mb-2">الدرجة</p><p class="text-5xl font-black text-white"><span id="f-score">0</span><span class="text-xl text-emerald-600">/30</span></p></div>
            <div class="bg-emerald-900/50 p-8 rounded-3xl flex-1 border border-emerald-800 flex flex-col justify-center"><p class="text-emerald-500 text-xs font-bold uppercase mb-2">النسبة</p><p id="f-perc" class="text-4xl font-black text-emerald-400">0%</p></div>
        </div>
        <button onclick="resetToStart()" class="bg-emerald-600 text-white px-16 py-5 rounded-2xl font-black text-xl hover:bg-emerald-500 transition-all shadow-xl active:scale-95">تحدي جديد</button>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
